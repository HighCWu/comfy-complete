# Comfy Complete - Supported Custom Nodes
# This file defines the custom node packs that are part of the Comfy Complete distribution.
# Each node pack is pinned to a specific version to ensure compatibility.

# Available labels - all labels used in node_packs must be declared here
labels:
  - ReadsArbitraryFile     # Node can read files from arbitrary paths
  - CreatesLargeOutputs    # Node may create unusually large outputs
  - WritesToDisk           # Node writes to the filesystem
  - NetworkAccess          # Node makes network requests
  - Stateful               # Node persists user-specific data between runs
  - HasCustomEndpoints     # Node registers custom HTTP server routes
  - RequiresExternalAPI    # Node requires external API keys (OpenAI, etc.)
  - PathParsing            # Node parses, manipulates, or exposes filesystem path information
  - DuplicateOfCoreNode    # Node duplicates functionality available in a core ComfyUI node
  - Incompatible           # Node fundamentally cannot work in a remote/headless environment
  - RequiresWebcam         # Node accesses webcam/camera hardware
  - RequiresDisplay        # Node requires GUI/display/X11 (preview windows, interactive UI)
  - RequiresClipboard      # Node accesses system clipboard
  - RequiresGPU            # Node requires GPU hardware (CUDA/ROCm) and will fail on CPU-only
  - BrokenNode             # Node is temporarily broken (API incompatibility, missing deps, etc.)
  - ExecutesArbitraryCode  # Node executes user-provided code (Python, JS, shell, etc.)
  - RuntimeModelDownload   # Node downloads models at inference time instead of pre-provisioned
  - RuntimePipInstall      # Node installs pip packages during execution

node_packs:
  - name: core
    node_labels:
      LoadImageDataSetFromFolder:
        - ReadsArbitraryFile
      LoadImageTextDataSetFromFolder:
        - ReadsArbitraryFile
      LoadTrainingDataset:
        - ReadsArbitraryFile
      SaveImageDataSetToFolder:
        - WritesToDisk
      SaveImageTextDataSetToFolder:
        - WritesToDisk
      SaveLoRA:
        - CreatesLargeOutputs
      SaveTrainingDataset:
        - WritesToDisk
      CheckpointSave:
        - CreatesLargeOutputs
      ImageOnlyCheckpointSave:
        - CreatesLargeOutputs
      ModelSave:
        - CreatesLargeOutputs
      ModelSaveKJ:
        - CreatesLargeOutputs
      LoraSave:
