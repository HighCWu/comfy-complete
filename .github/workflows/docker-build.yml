name: Docker Build

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/comfy-complete

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.cloudbuild
          target: base
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}:latest
            ${{ env.IMAGE_BASE }}:${{ github.sha }}
          cache-from: type=gha,scope=base
          cache-to: type=gha,scope=base,mode=max

  build-runpod:
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runpod
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.cloudbuild
          target: runpod
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-runpod:latest
            ${{ env.IMAGE_BASE }}-runpod:${{ github.sha }}
          cache-from: |
            type=gha,scope=base
            type=gha,scope=runpod
          cache-to: type=gha,scope=runpod,mode=max
