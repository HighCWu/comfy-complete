name: Docker Build

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  SAGEATTN_VERSION: "2.2.0"

jobs:
  build-sageattn:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space and move Docker data to /mnt
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /usr/local/share/boost \
            /usr/local/share/powershell \
            /usr/local/share/chromium \
            /usr/local/share/edge \
            /usr/local/share/firefox
          docker system prune -af --volumes || true
          sudo systemctl stop docker
          sudo rm -rf /var/lib/docker
          sudo mkdir -p /mnt/docker-data
          sudo ln -s /mnt/docker-data /var/lib/docker
          sudo systemctl start docker
          # Add swap as safety net during CUDA compilation
          sudo fallocate -l 16G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          echo "=== Disk space after cleanup ==="
          df -h / /mnt /var/lib/docker
          echo "=== Memory ==="
          free -h

      - uses: actions/checkout@v4

      - name: Set image name (lowercase)
        id: img
        run: echo "name=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/comfy-complete-sageattn" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if sageattn image already exists
        id: check
        run: |
          if docker manifest inspect ${{ steps.img.outputs.name }}:${{ env.SAGEATTN_VERSION }} >/dev/null 2>&1; then
            echo "skipped=true" >> $GITHUB_OUTPUT
            echo "Image ${{ steps.img.outputs.name }}:${{ env.SAGEATTN_VERSION }} already exists — skipping build"
          else
            echo "skipped=false" >> $GITHUB_OUTPUT
            echo "Image not found — will build"
          fi

      - name: Build and push sageattn wheels
        if: steps.check.outputs.skipped != 'true'
        run: |
          DOCKER_BUILDKIT=1 docker build \
            -f docker/sageattn.Dockerfile \
            --build-arg SAGEATTN_VERSION=${{ env.SAGEATTN_VERSION }} \
            -t ${{ steps.img.outputs.name }}:${{ env.SAGEATTN_VERSION }} \
            -t ${{ steps.img.outputs.name }}:latest \
            .
          docker push ${{ steps.img.outputs.name }}:${{ env.SAGEATTN_VERSION }}
          docker push ${{ steps.img.outputs.name }}:latest

  build-base:
    needs: build-sageattn
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space and move Docker data to /mnt
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /usr/local/share/boost \
            /usr/local/share/powershell \
            /usr/local/share/chromium \
            /usr/local/share/edge \
            /usr/local/share/firefox \
            /opt/hostedtoolcache/CodeQL
          docker system prune -af --volumes || true
          sudo systemctl stop docker
          sudo rm -rf /var/lib/docker
          sudo mkdir -p /mnt/docker-data
          sudo ln -s /mnt/docker-data /var/lib/docker
          sudo systemctl start docker
          echo "=== Disk space after cleanup ==="
          df -h / /mnt /var/lib/docker

      - uses: actions/checkout@v4

      - name: Set image base (lowercase)
        id: img
        run: echo "base=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/comfy-complete" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base image
        run: |
          DOCKER_BUILDKIT=1 docker build \
            -f docker/Dockerfile.cloudbuild \
            --build-arg SAGEATTN_VERSION=${{ env.SAGEATTN_VERSION }} \
            --target base \
            -t ${{ steps.img.outputs.base }}:latest \
            -t ${{ steps.img.outputs.base }}:${{ github.sha }} \
            .
          docker push ${{ steps.img.outputs.base }}:latest
          docker push ${{ steps.img.outputs.base }}:${{ github.sha }}

  build-runpod:
    needs: build-base
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space and move Docker data to /mnt
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /usr/local/share/boost \
            /usr/local/share/powershell \
            /usr/local/share/chromium \
            /usr/local/share/edge \
            /usr/local/share/firefox \
            /opt/hostedtoolcache/CodeQL
          docker system prune -af --volumes || true
          sudo systemctl stop docker
          sudo rm -rf /var/lib/docker
          sudo mkdir -p /mnt/docker-data
          sudo ln -s /mnt/docker-data /var/lib/docker
          sudo systemctl start docker
          echo "=== Disk space after cleanup ==="
          df -h / /mnt /var/lib/docker

      - uses: actions/checkout@v4

      - name: Set image base (lowercase)
        id: img
        run: echo "base=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/comfy-complete" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runpod image
        run: |
          DOCKER_BUILDKIT=1 docker build \
            -f docker/Dockerfile.runpod \
            --build-arg BASE_IMAGE=${{ steps.img.outputs.base }}:${{ github.sha }} \
            -t ${{ steps.img.outputs.base }}-runpod:latest \
            -t ${{ steps.img.outputs.base }}-runpod:${{ github.sha }} \
            .
          docker push ${{ steps.img.outputs.base }}-runpod:latest
          docker push ${{ steps.img.outputs.base }}-runpod:${{ github.sha }}
