name: Docker Build

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 512
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - uses: actions/checkout@v4

      - name: Check disk space
        run: df -h

      - name: Set image base (lowercase)
        id: img
        run: echo "base=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/comfy-complete" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build base image
        run: |
          DOCKER_BUILDKIT=1 docker build \
            -f docker/Dockerfile.cloudbuild \
            --target base \
            -t ${{ steps.img.outputs.base }}:latest \
            -t ${{ steps.img.outputs.base }}:${{ github.sha }} \
            .

      - name: Push base image
        run: |
          docker push ${{ steps.img.outputs.base }}:latest
          docker push ${{ steps.img.outputs.base }}:${{ github.sha }}

  build-runpod:
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 512
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - uses: actions/checkout@v4

      - name: Check disk space
        run: df -h

      - name: Set image base (lowercase)
        id: img
        run: echo "base=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/comfy-complete" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build runpod image
        run: |
          DOCKER_BUILDKIT=1 docker build \
            -f docker/Dockerfile.cloudbuild \
            --target runpod \
            -t ${{ steps.img.outputs.base }}-runpod:latest \
            -t ${{ steps.img.outputs.base }}-runpod:${{ github.sha }} \
            .

      - name: Push runpod image
        run: |
          docker push ${{ steps.img.outputs.base }}-runpod:latest
          docker push ${{ steps.img.outputs.base }}-runpod:${{ github.sha }}
