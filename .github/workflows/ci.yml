name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest pyyaml uv

      - name: Run tests
        run: pytest tests/ -v

  test-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate test workflow structure
        run: python scripts/validate_test_workflows.py

      - name: Check test coverage
        run: python scripts/check_test_coverage.py --warn-only

  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          yamllint -d relaxed supported_nodes.yaml
          yamllint -d relaxed version_lock.yaml
          yamllint -d relaxed build-config.yaml
          yamllint -d relaxed config.yaml.example
